<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#f0eee6">
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#262624">
    <title>{% block title %}股票信号监控{% endblock %}</title>
    <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='icon.svg') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <header class="topbar">
        <a class="brand" href="{{ url_for('index') }}">
            <img src="{{ url_for('static', filename='icon.svg') }}" alt="">
            <span>股票信号监控</span>
        </a>
        <div class="top-right">
            <span class="top-status" id="top-status" title="">—</span>
            <a class="btn-manage" href="{{ url_for('manage_page') }}">⚙ 管理</a>
        </div>
    </header>

    <main class="page">{% block body %}{% endblock %}</main>

    <footer class="footer">
        每天 <span id="sched-time">--</span> 自动联网分析 ·
        由 Claude 检索当日新闻并判定买卖信号 · 结果仅供研究参考，不构成投资建议
    </footer>

    <script>window.APP_ROOT = {{ request.script_root|tojson }};</script>
    <script src="{{ url_for('static', filename='js/prefix-shim.js') }}"></script>
    <script src="{{ url_for('static', filename='js/common.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
